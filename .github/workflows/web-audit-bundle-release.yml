name: Web Audit Bundle Release

on:
  push:
    tags:
      - 'web-audit-bundle/*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate bundle release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate tag matches bundleVersion
        if: startsWith(github.ref, 'refs/tags/web-audit-bundle/')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#web-audit-bundle/}"
          BUNDLE_VERSION="$(node -p "require('./scripts/web-audit-bundle.json').bundleVersion")"
          if [ "$TAG_VERSION" != "$BUNDLE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match bundleVersion ($BUNDLE_VERSION)"
            exit 1
          fi
          echo "Tag and bundleVersion match: $BUNDLE_VERSION"

      - name: Validate web audit bundle manifest
        run: node scripts/validate-web-audit-bundle.js

      - name: Run focused installer smoke test
        run: bash scripts/test-web-audit-installer.sh
